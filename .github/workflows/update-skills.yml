name: Update Catalog

on:
  schedule:
    # Her gece 03:00 UTC (Türkiye saatiyle 06:00)
    - cron: "0 3 * * *"
  workflow_dispatch: # Manuel tetiklenebilir

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch skills
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-skills.js

      - name: Build skills content
        run: node scripts/json-to-content.js

      - name: Fetch MCP servers
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-mcp.js

      - name: Build MCP content
        run: node scripts/mcp-json-to-content.js

      - name: Fetch Cursor rules
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-cursor-rules.js

      - name: Build Cursor rules content
        run: node scripts/cursor-rules-json-to-content.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills.json mcp.json cursor-rules.json src/content/
          if git diff --staged --quiet; then
            echo "✅ No changes — catalog is up to date"
          else
            git commit -m "chore: auto-update catalog ($(date +%Y-%m-%d))"
            git push
            echo "🚀 Pushed updated catalog"
          fi

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fafafa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#404040"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#e5e5e5" stroke-width="1" opacity="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>

  <!-- Logo mark -->
  <g transform="translate(540 175)">
    <rect width="120" height="120" rx="26" fill="#0a0a0a"/>
    <text x="60" y="86" font-family="Geist, system-ui, -apple-system, sans-serif" font-size="84" font-weight="900" fill="#ffffff" text-anchor="middle">n</text>
  </g>

  <!-- Wordmark -->
  <text x="600" y="400" font-family="Geist, system-ui, -apple-system, sans-serif" font-size="84" font-weight="800" fill="url(#accent)" text-anchor="middle" letter-spacing="-3">nayomy</text>

  <!-- Tagline -->
  <text x="600" y="460" font-family="Geist, system-ui, -apple-system, sans-serif" font-size="26" font-weight="500" fill="#737373" text-anchor="middle">Agent Skills &amp; MCP Servers — daily-updated catalog</text>

  <!-- Footer URL -->
  <text x="600" y="580" font-family="Geist Mono, ui-monospace, monospace" font-size="20" font-weight="500" fill="#a3a3a3" text-anchor="middle">nayomy.com</text>
</svg>
